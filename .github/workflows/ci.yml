name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  stasis-test:
    name: Stasis Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: stasis
      - name: Run tests with coverage
        run: npm run test:ci
        working-directory: stasis
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stasis-coverage
          path: stasis/coverage/

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: callytics
          POSTGRES_PASSWORD: callytics
          POSTGRES_DB: callytics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      - name: Run tests with coverage
        run: npm run test:ci
        working-directory: backend
        env:
          DATABASE_URL: postgresql://callytics:callytics@localhost:5432/callytics_test
          NODE_ENV: test
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run tests with coverage
        run: npm run test:ci
        working-directory: frontend
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [stasis-test, backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install workspace dependencies
        run: npm ci
      - name: TypeScript check frontend
        run: npx tsc -b --noEmit
        working-directory: frontend
      - name: TypeScript check backend
        run: npx tsc -b --noEmit
        working-directory: backend
      - name: TypeScript check stasis
        run: npx tsc -b --noEmit
        working-directory: stasis
