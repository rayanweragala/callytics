name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  stasis-test:
    name: Stasis Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Restore stasis node_modules cache
        id: restore-stasis-cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: stasis-node-modules-${{ runner.os }}-node-24-${{ hashFiles('package-lock.json') }}

      - name: Install stasis dependencies
        run: npm ci --workspace stasis

      - name: Save stasis node_modules cache
        if: success() && steps.restore-stasis-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: stasis-node-modules-${{ runner.os }}-node-24-${{ hashFiles('package-lock.json') }}

      - name: Run stasis tests with coverage
        id: run-stasis-tests
        run: |
          start=$(date +%s)
          echo "started_at=$start" >> "$GITHUB_OUTPUT"
          npm run test:ci 2>&1 | tee /tmp/stasis-test.log
          status=${PIPESTATUS[0]}
          end=$(date +%s)
          echo "finished_at=$end" >> "$GITHUB_OUTPUT"
          echo "duration=$((end-start))" >> "$GITHUB_OUTPUT"
          tests_line=$(grep -E '^Tests:' /tmp/stasis-test.log | tail -n 1 || true)
          echo "tests_line<<EOF" >> "$GITHUB_OUTPUT"
          echo "${tests_line:-Tests: unavailable}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          exit $status
        working-directory: stasis

      - name: Write stasis job summary
        if: always()
        run: |
          status="passed"
          if [ "${{ steps.run-stasis-tests.outcome }}" != "success" ]; then
            status="failed"
          fi
          {
            echo "## Stasis Test Summary"
            echo ""
            echo "- App: stasis"
            echo "- Node: 24"
            echo "- Status: ${status}"
            echo "- Tests: ${{ steps.run-stasis-tests.outputs.tests_line }}"
            echo "- Started: $(date -u -d @${{ steps.run-stasis-tests.outputs.started_at }} '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Finished: $(date -u -d @${{ steps.run-stasis-tests.outputs.finished_at }} '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Duration: ${{ steps.run-stasis-tests.outputs.duration }}s"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload stasis coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stasis-coverage
          path: stasis/coverage/
          retention-days: 7

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      REDIS_PORT: "6380"
      REDIS_HOST: "127.0.0.1"
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: callytics
          POSTGRES_PASSWORD: callytics
          POSTGRES_DB: callytics
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U callytics -d callytics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Restore backend node_modules cache
        id: restore-backend-cache
        uses: actions/cache/restore@v4
        with:
          path: backend/node_modules
          key: backend-node-modules-${{ runner.os }}-node-24-${{ hashFiles('backend/package-lock.json') }}

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Save backend node_modules cache
        if: success() && steps.restore-backend-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: backend/node_modules
          key: backend-node-modules-${{ runner.os }}-node-24-${{ hashFiles('backend/package-lock.json') }}

      - name: Run backend unit tests
        id: run-backend-unit
        run: |
          start=$(date +%s)
          echo "started_at=$start" >> "$GITHUB_OUTPUT"
          npm run test:unit 2>&1 | tee /tmp/backend-unit.log
          status=${PIPESTATUS[0]}
          end=$(date +%s)
          echo "finished_at=$end" >> "$GITHUB_OUTPUT"
          echo "duration=$((end-start))" >> "$GITHUB_OUTPUT"
          tests_line=$(grep -E '^Tests:' /tmp/backend-unit.log | tail -n 1 || true)
          echo "tests_line<<EOF" >> "$GITHUB_OUTPUT"
          echo "${tests_line:-Tests: unavailable}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          exit $status
        working-directory: backend
        env:
          DATABASE_URL: postgresql://callytics:***@localhost:5432/callytics
          NODE_ENV: test

      - name: Run backend integration tests
        id: run-backend-int
        run: |
          start=$(date +%s)
          echo "started_at=$start" >> "$GITHUB_OUTPUT"
          npm run test:ci 2>&1 | tee /tmp/backend-int.log
          status=${PIPESTATUS[0]}
          end=$(date +%s)
          echo "finished_at=$end" >> "$GITHUB_OUTPUT"
          echo "duration=$((end-start))" >> "$GITHUB_OUTPUT"
          tests_line=$(grep -E '^Tests:' /tmp/backend-int.log | tail -n 1 || true)
          echo "tests_line<<EOF" >> "$GITHUB_OUTPUT"
          echo "${tests_line:-Tests: unavailable}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          exit $status
        working-directory: backend
        env:
          DATABASE_URL: postgresql://callytics:***@localhost:5432/callytics
          NODE_ENV: test

      - name: Write backend job summary
        if: always()
        run: |
          status="passed"
          if [ "${{ steps.run-backend-unit.outcome }}" != "success" ] || [ "${{ steps.run-backend-int.outcome }}" != "success" ]; then
            status="failed"
          fi
          {
            echo "## Backend Test Summary"
            echo ""
            echo "- App: backend"
            echo "- Node: 24"
            echo "- Status: ${status}"
            echo "- Unit tests: ${{ steps.run-backend-unit.outputs.tests_line }}"
            echo "- Unit started: $(date -u -d @${{ steps.run-backend-unit.outputs.started_at }} '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Unit finished: $(date -u -d @${{ steps.run-backend-unit.outputs.finished_at }} '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Unit duration: ${{ steps.run-backend-unit.outputs.duration }}s"
            echo "- Integration tests: ${{ steps.run-backend-int.outputs.tests_line }}"
            echo "- Integration started: $(date -u -d @${{ steps.run-backend-int.outputs.started_at }} '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Integration finished: $(date -u -d @${{ steps.run-backend-int.outputs.finished_at }} '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Integration duration: ${{ steps.run-backend-int.outputs.duration }}s"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Restore frontend node_modules cache
        id: restore-frontend-cache
        uses: actions/cache/restore@v4
        with:
          path: frontend/node_modules
          key: frontend-node-modules-${{ runner.os }}-node-24-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Save frontend node_modules cache
        if: success() && steps.restore-frontend-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: frontend/node_modules
          key: frontend-node-modules-${{ runner.os }}-node-24-${{ hashFiles('frontend/package-lock.json') }}

      - name: Run frontend tests with coverage
        id: run-frontend-tests
        run: |
          start=$(date +%s)
          echo "started_at=$start" >> "$GITHUB_OUTPUT"
          npm run test:ci 2>&1 | tee /tmp/frontend-test.log
          status=${PIPESTATUS[0]}
          end=$(date +%s)
          echo "finished_at=$end" >> "$GITHUB_OUTPUT"
          echo "duration=$((end-start))" >> "$GITHUB_OUTPUT"
          tests_line=$(grep -E '^Tests:' /tmp/frontend-test.log | tail -n 1 || true)
          echo "tests_line<<EOF" >> "$GITHUB_OUTPUT"
          echo "${tests_line:-Tests: unavailable}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          exit $status
        working-directory: frontend

      - name: Write frontend job summary
        if: always()
        run: |
          status="passed"
          if [ "${{ steps.run-frontend-tests.outcome }}" != "success" ]; then
            status="failed"
          fi
          {
            echo "## Frontend Test Summary"
            echo ""
            echo "- App: frontend"
            echo "- Node: 24"
            echo "- Status: ${status}"
            echo "- Tests: ${{ steps.run-frontend-tests.outputs.tests_line }}"
            echo "- Started: $(date -u -d @${{ steps.run-frontend-tests.outputs.started_at }} '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Finished: $(date -u -d @${{ steps.run-frontend-tests.outputs.finished_at }} '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Duration: ${{ steps.run-frontend-tests.outputs.duration }}s"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload frontend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [stasis-test, backend-test, frontend-test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Restore workspace node_modules cache
        id: restore-workspace-cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: workspace-node-modules-${{ runner.os }}-node-24-${{ hashFiles('package-lock.json') }}

      - name: Install workspace dependencies
        if: steps.restore-workspace-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Save workspace node_modules cache
        if: success() && steps.restore-workspace-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: workspace-node-modules-${{ runner.os }}-node-24-${{ hashFiles('package-lock.json') }}

      - name: TypeScript check frontend
        run: npx tsc -b --noEmit
        working-directory: frontend

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: TypeScript check backend
        run: npx tsc -b --noEmit
        working-directory: backend

      - name: Install stasis dependencies
        run: npm ci --workspace stasis

      - name: TypeScript check stasis
        run: npx tsc -b --noEmit
        working-directory: stasis
