name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Filter Paths
    runs-on: ubuntu-latest
    outputs:
      stasis: ${{ steps.filter.outputs.stasis }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            stasis:
              - 'stasis/**'
              - '.github/workflows/ci.yml'
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  stasis-test:
    name: Stasis Tests
    needs: filter
    if: needs.filter.outputs.stasis == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: stasis/package-lock.json

      - name: Install stasis dependencies
        run: npm ci --workspace stasis

      - name: Run stasis tests with coverage
        id: run-stasis-tests
        run: |
          start=$(date +%s)
          echo "started_at=$start" >> "$GITHUB_OUTPUT"
          npm run test:ci 2>&1 | tee /tmp/stasis-test.log
          status=${PIPESTATUS[0]}
          end=$(date +%s)
          echo "finished_at=$end" >> "$GITHUB_OUTPUT"
          echo "duration=$((end-start))" >> "$GITHUB_OUTPUT"
          tests_line=$(grep -E '^Tests:' /tmp/stasis-test.log | tail -n 1 || true)
          echo "tests_line<<EOF" >> "$GITHUB_OUTPUT"
          echo "${tests_line:-Tests: unavailable}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          exit $status
        working-directory: stasis

      - name: Write stasis job summary
        if: always()
        run: |
          status="passed"
          if [ "${{ steps.run-stasis-tests.outcome }}" != "success" ]; then
            status="failed"
          fi
          {
            echo "## Stasis Test Summary"
            echo ""
            echo "- App: stasis"
            echo "- Node: 24"
            echo "- Status: ${status}"
            echo "- Tests: ${{ steps.run-stasis-tests.outputs.tests_line }}"
            echo "- Started: $(date -u -d @${{ steps.run-stasis-tests.outputs.started_at }} '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Finished: $(date -u -d @${{ steps.run-stasis-tests.outputs.finished_at }} '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Duration: ${{ steps.run-stasis-tests.outputs.duration }}s"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload stasis coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stasis-coverage
          path: stasis/coverage/
          retention-days: 7

  backend-test:
    name: Backend Tests
    needs: filter
    if: needs.filter.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      REDIS_PORT: "6380"
      REDIS_HOST: "127.0.0.1"
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: callytics
          POSTGRES_PASSWORD: callytics
          POSTGRES_DB: callytics
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U callytics -d callytics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run backend unit tests
        id: run-backend-unit
        run: |
          start=$(date +%s)
          echo "started_at=$start" >> "$GITHUB_OUTPUT"
          npm run test:unit 2>&1 | tee /tmp/backend-unit.log
          status=${PIPESTATUS[0]}
          end=$(date +%s)
          echo "finished_at=$end" >> "$GITHUB_OUTPUT"
          echo "duration=$((end-start))" >> "$GITHUB_OUTPUT"
          tests_line=$(grep -E '^Tests:' /tmp/backend-unit.log | tail -n 1 || true)
          echo "tests_line<<EOF" >> "$GITHUB_OUTPUT"
          echo "${tests_line:-Tests: unavailable}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          exit $status
        working-directory: backend
        env:
          DATABASE_URL: postgresql://callytics:callytics@localhost:5432/callytics
          NODE_ENV: test

      - name: Run backend integration tests
        id: run-backend-int
        run: |
          start=$(date +%s)
          echo "started_at=$start" >> "$GITHUB_OUTPUT"
          npm run test:ci 2>&1 | tee /tmp/backend-int.log
          status=${PIPESTATUS[0]}
          end=$(date +%s)
          echo "finished_at=$end" >> "$GITHUB_OUTPUT"
          echo "duration=$((end-start))" >> "$GITHUB_OUTPUT"
          tests_line=$(grep -E '^Tests:' /tmp/backend-int.log | tail -n 1 || true)
          echo "tests_line<<EOF" >> "$GITHUB_OUTPUT"
          echo "${tests_line:-Tests: unavailable}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          exit $status
        working-directory: backend
        env:
          DATABASE_URL: postgresql://callytics:callytics@localhost:5432/callytics
          NODE_ENV: test

      - name: Write backend job summary
        if: always()
        run: |
          status="passed"
          if [ "${{ steps.run-backend-unit.outcome }}" != "success" ] || [ "${{ steps.run-backend-int.outcome }}" != "success" ]; then
            status="failed"
          fi
          {
            echo "## Backend Test Summary"
            echo ""
            echo "- App: backend"
            echo "- Node: 24"
            echo "- Status: ${status}"
            echo "- Unit tests: ${{ steps.run-backend-unit.outputs.tests_line }}"
            echo "- Unit started: $(date -u -d @${{ steps.run-backend-unit.outputs.started_at }} '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Unit finished: $(date -u -d @${{ steps.run-backend-unit.outputs.finished_at }} '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Unit duration: ${{ steps.run-backend-unit.outputs.duration }}s"
            echo "- Integration tests: ${{ steps.run-backend-int.outputs.tests_line }}"
            echo "- Integration started: $(date -u -d @${{ steps.run-backend-int.outputs.started_at }} '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Integration finished: $(date -u -d @${{ steps.run-backend-int.outputs.finished_at }} '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Integration duration: ${{ steps.run-backend-int.outputs.duration }}s"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  frontend-test:
    name: Frontend Tests
    needs: filter
    if: needs.filter.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests with coverage
        id: run-frontend-tests
        run: |
          start=$(date +%s)
          echo "started_at=$start" >> "$GITHUB_OUTPUT"
          npm run test:ci 2>&1 | tee /tmp/frontend-test.log
          status=${PIPESTATUS[0]}
          end=$(date +%s)
          echo "finished_at=$end" >> "$GITHUB_OUTPUT"
          echo "duration=$((end-start))" >> "$GITHUB_OUTPUT"
          tests_line=$(grep -E '^Tests:' /tmp/frontend-test.log | tail -n 1 || true)
          echo "tests_line<<EOF" >> "$GITHUB_OUTPUT"
          echo "${tests_line:-Tests: unavailable}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          exit $status
        working-directory: frontend

      - name: Write frontend job summary
        if: always()
        run: |
          status="passed"
          if [ "${{ steps.run-frontend-tests.outcome }}" != "success" ]; then
            status="failed"
          fi
          {
            echo "## Frontend Test Summary"
            echo ""
            echo "- App: frontend"
            echo "- Node: 24"
            echo "- Status: ${status}"
            echo "- Tests: ${{ steps.run-frontend-tests.outputs.tests_line }}"
            echo "- Started: $(date -u -d @${{ steps.run-frontend-tests.outputs.started_at }} '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Finished: $(date -u -d @${{ steps.run-frontend-tests.outputs.finished_at }} '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Duration: ${{ steps.run-frontend-tests.outputs.duration }}s"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload frontend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  build-check:
    name: Build Check
    needs: filter
    if: needs.filter.outputs.frontend == 'true' || needs.filter.outputs.backend == 'true' || needs.filter.outputs.stasis == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: TypeScript check frontend
        if: needs.filter.outputs.frontend == 'true'
        run: npx tsc -b --noEmit
        working-directory: frontend

      - name: TypeScript check backend
        if: needs.filter.outputs.backend == 'true'
        run: npx tsc -b --noEmit
        working-directory: backend

      - name: TypeScript check stasis
        if: needs.filter.outputs.stasis == 'true'
        run: npx tsc -b --noEmit
        working-directory: stasis

  ci-pass:
    name: CI Pass
    if: always()
    needs: [stasis-test, backend-test, frontend-test, build-check]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          STASIS_OUTCOME="${{ needs.stasis-test.result }}"
          BACKEND_OUTCOME="${{ needs.backend-test.result }}"
          FRONTEND_OUTCOME="${{ needs.frontend-test.result }}"
          BUILD_OUTCOME="${{ needs.build-check.result }}"
          
          echo "Stasis: $STASIS_OUTCOME"
          echo "Backend: $BACKEND_OUTCOME"
          echo "Frontend: $FRONTEND_OUTCOME"
          echo "Build: $BUILD_OUTCOME"
          
          # All jobs must either succeed or be skipped
          for result in "$STASIS_OUTCOME" "$BACKEND_OUTCOME" "$FRONTEND_OUTCOME" "$BUILD_OUTCOME"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "Error: One or more required jobs failed: $result"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped correctly."
