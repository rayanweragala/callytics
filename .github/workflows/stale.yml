name: Mark stale issues
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 14
          days-before-issue-close: 7
          days-before-pr-stale: -1
          days-before-pr-close: -1
          stale-issue-label: 'stale'
          stale-issue-message: 'This issue has been inactive for 14 days and will be closed in 7 days if there is no update. If the issue is still relevant, please leave a comment.'
          close-issue-message: 'This issue is being closed due to inactivity. If the problem persists, please reopen it.'
          exempt-issue-labels: 'pinned,bug,in-progress'
